<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aİ-LA - Ağıllı Köməkçi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --header-bg: #ffffff; --input-bg: #f9fafb; --ai-bubble: #f3f4f6; }
        .dark { --bg: #121212; --text: #f3f4f6; --header-bg: #1e1e1e; --input-bg: #2d2d2d; --ai-bubble: #2d2d2d; }

        body { background-color: var(--bg); color: var(--text); transition: all 0.3s ease; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .chat-bubble { max-width: 85%; border-radius: 18px; padding: 12px 16px; margin-bottom: 10px; font-size: 15px; position: relative; line-height: 1.5; }
        .user-msg { background-color: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background-color: var(--ai-bubble); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .voice-btn { cursor: pointer; margin-top: 8px; font-size: 12px; color: #3b82f6; display: flex; items-center: center; gap: 5px; transition: 0.2s; }
        .voice-btn:hover { opacity: 0.7; }

        .link-style { color: #3b82f6; text-decoration: underline; font-weight: 600; }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        .typing-effect { overflow: hidden; display: inline-block; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
        <div class="flex items-center gap-3">
            <img id="header-logo" src="" class="w-10 h-10 rounded-full border shadow-sm" alt="AI-LA">
            <div>
                <h1 class="text-sm font-bold">Aİ-LA <span class="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded ml-1">PRO</span></h1>
                <p class="text-[10px] opacity-60">Onlayn Axtarış Aktivdir</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="createNewChat()" class="text-gray-500 hover:text-blue-500 transition"><i class="fa-solid fa-rotate-right"></i></button>
            <button onclick="toggleTheme()" id="theme-btn" class="text-gray-500"><i class="fa-solid fa-moon"></i></button>
        </div>
    </header>

    <main id="chat-screen" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-4">
        <div id="welcome-ui" class="mt-20 flex flex-col items-center text-center">
            <img id="main-logo" src="" class="w-20 h-20 rounded-full border-4 border-blue-500/10 mb-4 shadow-xl" alt="AI-LA">
            <h2 class="text-xl font-bold">Mən Aİ-LA, sənə necə kömək edim?</h2>
            <p class="text-xs opacity-50 mt-2 max-w-xs">Həm söhbət edə, həm də internetdən məlumat tapa bilərəm.</p>
        </div>
        <div id="messages-container" class="w-full flex flex-col space-y-4"></div>
    </main>

    <footer class="p-4 bg-transparent">
        <div class="max-w-3xl mx-auto relative">
            <input id="userInput" type="text" placeholder="Sualınızı bura yazın..." 
                class="w-full py-4 px-6 pr-14 rounded-2xl border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button onclick="handleSend()" class="absolute right-2 top-2 bg-blue-500 text-white p-3 rounded-xl hover:bg-blue-600 transition-all">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        const BOT_IMAGE_URL = "https://ia600708.us.archive.org/32/items/in-shot-20260418-170546888-edit-276364459678532_202604/InShot_20260418_170546888_edit_276364459678532.jpg";
        document.getElementById('header-logo').src = BOT_IMAGE_URL;
        document.getElementById('main-logo').src = BOT_IMAGE_URL;

        const knowledgeBase = {
            "salam": "Salam! Mən Aİ-LA. Sizin üçün internetdə araşdırma edə və ya sadəcə söhbət edə bilərəm. Necə kömək edim?",
            "necəsən": "Təşəkkür edirəm! Sizin üçün məlumat toplamaq məni xoşbəxt edir. Siz necəsiz?",
            "kim yaradıb": "Mən Əli Məhərrəmov tərəfindən hazırlanmış süni intellekt köməkçisiyəm."
        };

        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        function createNewChat() {
            location.reload();
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            document.getElementById('welcome-ui').classList.add('hidden');
            addBubble(text, 'user-msg');
            input.value = '';

            // Botun düşünmə effekti
            const loadingId = "loading-" + Date.now();
            addBubble("Düşünürəm və axtarıram...", 'ai-msg', loadingId);

            setTimeout(async () => {
                let response = "";
                let lowerText = text.toLowerCase();

                // 1. Lokaldan yoxla
                if (knowledgeBase[lowerText]) {
                    response = knowledgeBase[lowerText];
                } 
                // 2. Əgər lokalda yoxdursa "Simulyasiya edilmiş Axtarış" və ya Cavab generatoru
                else {
                    response = await simulateSearch(text);
                }

                document.getElementById(loadingId).remove();
                addBubble(response, 'ai-msg', null, true);
            }, 1000);
        }

        // İnternetdən məlumat toplama simulyasiyası (Axtarış linkləri ilə)
        async function simulateSearch(query) {
            const searchLink = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            const wikiLink = `https://az.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(query)}`;
            
            return `Sualınızla bağlı geniş araşdırma apardım. Budur tapdıqlarım: 
            \n\n"${query}" haqqında ən son məlumatları toplamaq üçün bir neçə mənbəyə baxa bilərik. Məlumatlar Google və Wikipedia bazasında mövcuddur.
            \n\n🔗 <a href="${searchLink}" target="_blank" class="link-style">Google-da nəticələrə bax</a>
            \n🔗 <a href="${wikiLink}" target="_blank" class="link-style">Wikipedia məlumatlarını oxu</a>
            \n\nHəmçinin qeyd edim ki, bu mövzu ilə bağlı geniş analizi yuxarıdakı rəsmi saytlardan daha dəqiq əldə edə bilərsiniz.`;
        }

        function addBubble(content, type, id = null, hasVoice = false) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.className = `chat-bubble ${type} animate-fade-in`;
            if (id) div.id = id;
            
            // HTML dəstəyi (linklər üçün)
            div.innerHTML = `<div>${content.replace(/\n/g, '<br>')}</div>`;

            if (hasVoice) {
                const voiceBtn = document.createElement('div');
                voiceBtn.className = "voice-btn";
                voiceBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> Səsli oxu`;
                voiceBtn.onclick = () => speakText(content);
                div.appendChild(voiceBtn);
            }

            container.appendChild(div);
            const chatScreen = document.getElementById('chat-screen');
            chatScreen.scrollTo({ top: chatScreen.scrollHeight, behavior: 'smooth' });
        }

        function speakText(text) {
            // Mətndən HTML taglarını silirik ki, robot linkləri oxumasın
            const cleanText = text.replace(/<\/?[^>]+(>|$)/g, "");
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            // Azərbaycan dili üçün qadın səsi seçimi (Brauzerdə varsa)
            const voices = window.speechSynthesis.getVoices();
            // Az dili birbaşa dəstəklənməyə bilər, ən yaxın Türk və ya Rus qadın səsi seçilir
            const azVoice = voices.find(v => v.lang.includes('tr') || v.lang.includes('az'));
            
            if (azVoice) utterance.voice = azVoice;
            utterance.lang = 'tr-TR'; // Azərbaycan dilinə ən yaxın səslənmə üçün
            utterance.rate = 0.9;
            utterance.pitch = 1.1;

            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('userInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleSend();
        });

        // Səsləri yüklə
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
