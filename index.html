<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A陌-LA - Suallar谋n谋 Ayladan Soru艧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --header-bg: #ffffff; --input-bg: #f9fafb; }
        .dark { --bg: #121212; --text: #f3f4f6; --header-bg: #1e1e1e; --input-bg: #2d2d2d; }

        body { background-color: var(--bg); color: var(--text); transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        header { background-color: var(--header-bg); border-bottom: 1px solid rgba(128, 128, 128, 0.2); }
        
        .chat-bubble { max-width: 85%; border-radius: 20px; padding: 12px 16px; margin-bottom: 10px; font-size: 15px; }
        .user-msg { background-color: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background-color: #f3f4f6; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .dark .ai-msg { background-color: #2d2d2d; color: #f3f4f6; }
        
        footer { background-color: var(--bg); border-top: 1px solid rgba(128, 128, 128, 0.1); }
        input { background-color: var(--input-bg) !important; color: var(--text) !important; }
        .input-shadow { box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="flex items-center justify-between p-4 sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <img id="header-logo" src="https://i.imgur.com/86v9V89.png" class="w-10 h-10 rounded-full object-cover border" alt="AI-LA">
            <div>
                <h1 class="text-sm font-bold">AI-LA</h1>
                <p class="text-[10px] opacity-60">S眉ni intellekt k枚m蓹k莽isi</p>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="createNewChat()" title="Yeni S枚hb蓹t" class="text-blue-500 hover:scale-110 transition">
                <i class="fa-solid fa-plus-circle text-xl"></i>
            </button>
            <button onclick="toggleTheme()" id="theme-btn" class="hover:rotate-12 transition">
                <i class="fa-solid fa-moon text-xl"></i>
            </button>
        </div>
    </header>

    <main id="chat-screen" class="flex-1 overflow-y-auto p-4 flex flex-col">
        
        <div id="welcome-ui" class="mt-20 flex flex-col items-center text-center">
            <div class="relative mb-6">
                <img id="main-logo" src="https://i.imgur.com/86v9V89.png" class="w-24 h-24 rounded-full border-4 border-blue-100 shadow-lg" alt="AI-LA">
            </div>
            <h2 class="text-2xl font-bold mb-2">AI-LA-ya xo艧 g蓹ldiniz</h2>
            <p class="opacity-60 max-w-[280px] text-sm">M蓹n sizin a臒谋ll谋 k枚m蓹k莽iniz蓹m. Buyurun, sual谋n谋z谋 verin.</p>
        </div>

        <div id="messages-container" class="w-full flex flex-col hidden space-y-2"></div>
    </main>

    <footer class="p-4 input-shadow">
        <div class="max-w-2xl mx-auto relative">
            <input id="userInput" type="text" placeholder="AI-LA-ya mesaj yaz谋n..." 
                class="w-full py-4 px-6 pr-16 border border-transparent rounded-[30px] focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all shadow-sm">
            
            <button onclick="handleSend()" class="absolute right-2 top-2 bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-full shadow-md transition-all">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
        <p class="text-[10px] text-center opacity-40 mt-3">AI-LA s蓹hv ed蓹 bil蓹r. M蓹lumatlar谋 yoxlay谋n.</p>
    </footer>

    <script>
        // ==========================================
        // 1. BOTUN 艦茝K陌L L陌NK陌N陌 BURADAN D茝Y陌艦D陌R:
        // ==========================================
        const BOT_IMAGE_URL = "https://i.imgur.com/86v9V89.png"; 

        // 艦蓹kill蓹ri t蓹tbiq etm蓹k 眉莽眉n avtomatik kod
        document.getElementById('header-logo').src = BOT_IMAGE_URL;
        document.getElementById('main-logo').src = BOT_IMAGE_URL;

        // --- SUAL-CAVAB BAZASI ---
        const knowledgeBase = {
            "salam": "Salam! Nec蓹s蓹n? S蓹n蓹 bu g眉n nec蓹 k枚m蓹k ed蓹 bil蓹r蓹m?",
            "sa臒 ol": "D蓹ym蓹z! H蓹mi艧蓹 xidm蓹tind蓹y蓹m. 馃槉",
            "nec蓹s蓹n": "M蓹n 莽ox yax艧谋yam! S蓹nin 眉莽眉n n蓹 ed蓹 bil蓹r蓹m?",
            "s蓹n nec蓹s蓹n": "M蓹n bir s眉ni intellekt蓹m, h蓹r zaman i艧l蓹m蓹y蓹 haz谋ram! B蓹s s蓹n nec蓹s蓹n?",
            "ad谋n n蓹dir": "M蓹nim ad谋m AI-LA-d谋r. S蓹nin a臒谋ll谋 k枚m蓹k莽in蓹m.",
            "kim yarad谋b": "M蓹n s蓹nin 眉莽眉n x眉susi olaraq kodla艧d谋r谋lm谋艧 bir k枚m蓹k莽iy蓹m.",
            "hara ged蓹k": "Bak谋n谋n k眉l蓹kli bulvar谋nda bir g蓹zinti he莽 vaxt pis fikir deyil! 馃嚘馃嚳",
            "hava nec蓹dir": "P蓹nc蓹r蓹d蓹n baxma臒谋 unutma, amma 眉mid edir蓹m ki, 眉r蓹yin kimi g枚z蓹ldir!"
        };

        const body = document.body;
        const welcomeUI = document.getElementById('welcome-ui');
        const msgContainer = document.getElementById('messages-container');
        const input = document.getElementById('userInput');
        const themeBtn = document.querySelector('#theme-btn i');

        function toggleTheme() {
            body.classList.toggle('dark');
            if(body.classList.contains('dark')) {
                themeBtn.className = "fa-solid fa-sun text-yellow-400";
            } else {
                themeBtn.className = "fa-solid fa-moon text-gray-600";
            }
        }

        function createNewChat() {
            msgContainer.innerHTML = '';
            msgContainer.classList.add('hidden');
            welcomeUI.classList.remove('hidden');
            input.value = '';
        }

        function handleSend() {
            const rawText = input.value.trim();
            const text = rawText.toLowerCase();
            if (!rawText) return;

            welcomeUI.classList.add('hidden');
            msgContainer.classList.remove('hidden');

            addBubble(rawText, 'user-msg');
            input.value = '';

            setTimeout(() => {
                let response = "Ba臒谋艧lay谋n, bunu h蓹l蓹 ba艧qa c眉r 枚yr蓹nm蓹liy蓹m. Amma sual谋n maraql谋d谋r!";
                for (let key in knowledgeBase) {
                    if (text.includes(key)) {
                        response = knowledgeBase[key];
                        break;
                    }
                }
                addBubble(response, 'ai-msg');
            }, 600);
        }

        function addBubble(text, type) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${type} animate-fade-in`;
            div.innerText = text;
            msgContainer.appendChild(div);
            
            const chatScreen = document.getElementById('chat-screen');
            chatScreen.scrollTo({ top: chatScreen.scrollHeight, behavior: 'smooth' });
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</body>
</html>
