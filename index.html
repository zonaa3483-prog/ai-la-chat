<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LA - Süni İntellekt</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FFFFFF; display: flex; flex-direction: column; height: 100vh; color: #1A1D21; transition: 0.3s; }
        
        /* Gecə Rejimi rəngləri */
        body.dark-mode { background: #121212; color: #ffffff; }
        body.dark-mode header { background: #1e1e1e; border-color: #333; }
        body.dark-mode footer { background: #1e1e1e; border-top: 1px solid #333; }
        body.dark-mode .ai { background: #2c2c2c; color: #e0e0e0; }
        body.dark-mode input { background: #2c2c2c; border-color: #444; color: white; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #E8EAEB; background: white; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
        
        /* Düymələrin bir-birindən aralı olması */
        .header-actions { display: flex; align-items: center; gap: 20px; } 
        .action-btn { cursor: pointer; font-size: 20px; color: #70777F; transition: 0.2s; user-select: none; }
        .action-btn:hover { color: #000; }
        body.dark-mode .action-btn:hover { color: #fff; }

        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.4; font-size: 15px; word-wrap: break-word; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #F1F3F4; color: #1A1D21; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }

        footer { padding: 15px; background: white; border-top: 1px solid #E8EAEB; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .input-box { width: 100%; max-width: 600px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #E8EAEB; border-radius: 25px; outline: none; font-size: 16px; }
        button#sendBtn { background: #34A853; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="https://ia902800.us.archive.org/11/items/0da-12f-11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930/0da12f11-d0a6-4f33-ad83-d4d91b40f930.jpg" class="logo">
        <div><strong>AI-LA</strong><br><small style="color:#70777F">Süni İntellekt</small></div>
    </div>
    <div class="header-actions">
        <div class="action-btn" title="Yeni Söhbət" onclick="location.reload()">+</div>
        <div class="action-btn" title="Rejimi Dəyiş" onclick="toggleTheme()">🌓</div>
    </div>
</header>

<main id="chat"></main>

<footer>
    <div class="input-box">
        <input type="text" id="in" placeholder="Mesajınızı yazın...">
        <button id="sendBtn" onclick="send()">➔</button>
    </div>
    <p style="font-size: 11px; color: #A0A4A8;">AI-LA səhv edə bilər.</p>
</footer>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // API açarı və Model sazlaması
    const API_KEY = "AIzaSyDD0AXiQ4XxeWlpYtsuTXuWVJ4_aPII66Q"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    
    // Model adını 404 xətası verməməsi üçün güncəllədik
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('in');

    window.toggleTheme = () => {
        document.body.classList.toggle('dark-mode');
    };

    window.send = async () => {
        const val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";
        const loadingId = addMsg("Düşünürəm...", 'ai');

        try {
            const result = await model.generateContent(val);
            const response = await result.response;
            const text = response.text();
            document.getElementById(loadingId).textContent = text;
        } catch (err) {
            console.error(err);
            // Xəta mesajını daha anlaşıqlı etdik
            document.getElementById(loadingId).textContent = "Bağlantı xətası! Zəhmət olmasa bir az sonra yenidən cəhd edin.";
        }
    };

    function addMsg(txt, cls) {
        const id = 'm' + Date.now();
        const d = document.createElement('div');
        d.id = id;
        d.className = 'msg ' + cls;
        d.textContent = txt;
        chatDiv.appendChild(d);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        return id;
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>

</body>
</html>
