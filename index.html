<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aİ-LA - Süni İntellekt Köməkçisi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FFFFFF; display: flex; flex-direction: column; height: 100vh; color: #1A1D21; overflow: hidden; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #E8EAEB; background: white; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
        .header-text h1 { font-size: 15px; font-weight: 700; }
        .header-text p { font-size: 11px; color: #70777F; }
        .header-actions { display: flex; gap: 15px; color: #70777F; font-size: 22px; cursor: pointer; }

        main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; scroll-behavior: smooth; }

        #welcome-section { display: flex; flex-direction: column; align-items: center; gap: 15px; text-align: center; margin-top: 15%; }
        .central-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .central-icon { width: 40px; height: 40px; background: #F1F3F4; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #34A853; font-size: 20px; }
        .welcome-title { font-size: 22px; font-weight: 700; }
        .welcome-sub { font-size: 14px; color: #70777F; max-width: 280px; }

        #chat-messages { width: 100%; max-width: 600px; display: none; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .message { padding: 12px 16px; border-radius: 18px; font-size: 15px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #F1F3F4; color: #1A1D21; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }

        footer { padding: 15px 20px; background: white; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .input-box { width: 100%; max-width: 600px; display: flex; align-items: center; background: #fff; border: 1px solid #E8EAEB; border-radius: 25px; padding: 5px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { flex: 1; border: none; padding: 10px; font-size: 16px; outline: none; }
        .send-btn { border: none; background: #34A853; color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.4; transition: 0.3s; }
        .send-btn.active { opacity: 1; }
        .disclaimer { font-size: 11px; color: #A0A4A8; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="https://ia902800.us.archive.org/11/items/0da-12f-11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930/0da12f11-d0a6-4f33-ad83-d4d91b40f930.jpg" class="header-logo">
        <div class="header-text">
            <h1>Aİ-LA</h1>
            <p>Süni intellekt köməkçisi</p>
        </div>
    </div>
    <div class="header-actions">
        <span onclick="newChat()">+</span>
        <span>&#9790;</span>
    </div>
</header>

<main id="scroll-area">
    <div id="welcome-section">
        <img src="https://ia902800.us.archive.org/11/items/0da-12f-11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930/0da12f11-d0a6-4f33-ad83-d4d91b40f930.jpg" class="central-avatar">
        <div class="central-icon">✦</div>
        <h2 class="welcome-title">Aİ-LA-ya xoş gəldiniz</h2>
        <p class="welcome-sub">Mən Aİ-LA-yam, sizin ağıllı köməkçiniz. İstənilən sualı verə bilərsiniz.</p>
    </div>
    <div id="chat-messages"></div>
</main>

<footer>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="AI-LA-ya mesaj yazın..." oninput="toggleBtn()">
        <button id="sendBtn" class="send-btn" onclick="askAI()">➔</button>
    </div>
    <p class="disclaimer">Aİ-LA səhv edə bilər. Vacib məlumatları yoxlayın.</p>
</footer>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // API açarın yoxlanıldı və yerləşdirildi
    const API_KEY = "AIzaSyDDoAXiQ4XxeWIpYtsuTXuWVJ4_aPII66Q";
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const messages = document.getElementById('chat-messages');
    const welcome = document.getElementById('welcome-section');
    const scrollArea = document.getElementById('scroll-area');

    window.toggleBtn = () => {
        btn.classList.toggle('active', input.value.trim() !== "");
    };

    window.askAI = async () => {
        const text = input.value.trim();
        if (!text) return;

        welcome.style.display = 'none';
        messages.style.display = 'flex';

        addMsg(text, 'user');
        input.value = "";
        toggleBtn();

        const loadingId = addMsg("Düşünürəm...", 'ai');

        try {
            const result = await model.generateContent(text);
            const response = await result.response;
            const output = response.text();
            updateMsg(loadingId, output);
        } catch (err) {
            console.error(err);
            updateMsg(loadingId, "Xəta: API hələ aktiv deyil və ya limit dolub. Bir neçə dəqiqə sonra yoxlayın.");
        }
    };

    window.newChat = () => {
        messages.innerHTML = "";
        messages.style.display = "none";
        welcome.style.display = "flex";
    };

    function addMsg(text, type) {
        const id = 'm-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = `message ${type}`;
        div.textContent = text;
        messages.appendChild(div);
        scrollArea.scrollTop = scrollArea.scrollHeight;
        return id;
    }

    function updateMsg(id, text) {
        const div = document.getElementById(id);
        if (div) div.textContent = text;
        scrollArea.scrollTop = scrollArea.scrollHeight;
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") askAI(); });
</script>

</body>
</html>
