<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LA - Süni İntellekt</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FFFFFF; display: flex; flex-direction: column; height: 100vh; }
        
        /* Dark Mode */
        body.dark-mode { background: #121212; color: #ffffff; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #eee; }
        .dark-mode .header { border-bottom-color: #333; }
        
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #F1F3F4; color: black; border-bottom-left-radius: 4px; }
        .dark-mode .ai-msg { background: #2c2c2c; color: #e0e0e0; }

        .input-area { padding: 15px; background: white; border-top: 1px solid #E8EAEB; }
        .dark-mode .input-area { background: #1e1e1e; border-top-color: #333; }
        .input-box { display: flex; max-width: 600px; margin: 0 auto; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border: 1px solid #E8EAEB; border-radius: 25px; outline: none; font-size: 16px; }
        .dark-mode input { background: #2c2c2c; border-color: #444; color: white; }
        button { background: #34A853; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; }
        .footer-text { font-size: 11px; text-align: center; color: #A0A4A8; margin-top: 8px; }
    </style>
</head>
<body id="body">

    <div class="header">
        <div class="logo-area">
            <img class="logo-img" src="https://ia902800.us.archive.org/11/items/0da-12f-11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930/0da12f11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930.jpg" alt="AI-LA">
            <div><strong>AI-LA</strong><br><small style="color: #70777F;">Süni İntellekt</small></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="location.reload()" style="background:none; color:#70777F; font-size: 12px;">Yeni Söhbət</button>
            <button onclick="toggleTheme()" style="background:none; font-size: 18px;">🌙</button>
        </div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
            <button id="sendBtn" onclick="sendMessage()">Göndər</button>
        </div>
        <div class="footer-text">AI-LA səhv edə bilər.</div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const API_KEY = "BURAYA_OZ_API_KEY_YAZ"; // Sənin şəkildəki API açarın bura gəlməlidir
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');

        window.sendMessage = async () => {
            const text = userInput.value;
            if (!text) return;

            // İstifadəçi mesajı
            addMessage(text, 'user-msg');
            userInput.value = '';

            try {
                const result = await model.generateContent("Sən AI-LA adlı Azərbaycanlı süni intellektsən. Cavabları Azərbaycan dilində ver: " + text);
                const response = await result.response;
                addMessage(response.text(), 'ai-msg');
            } catch (error) {
                addMessage("Xəta baş verdi: " + error.message, 'ai-msg');
            }
        };

        function addMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
        };
    </script>
</body>
</html>
