<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LA - Süni İntellekt</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; }
        .logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .ai { background: #e9e9eb; color: #333; align-self: flex-start; white-space: pre-wrap; }
        footer { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #28a745; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="https://ia902800.us.archive.org/11/items/0da-12f-11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930/0da12f11-d0a6-4f33-ad83-d4d91b40f930.jpg" class="logo">
    <div><strong>AI-LA</strong><br><small>Süni İntellekt Köməkçisi</small></div>
</header>

<main id="chat"></main>

<footer>
    <input type="text" id="in" placeholder="Mesajınızı yazın...">
    <button onclick="send()">Göndər</button>
</footer>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // BURAYA ÖZ API AÇARINI YAPIŞDIR
    const API_KEY = "AIzaSyDDoAXiQ4XxeWIpYtsuTXuWVJ4_aPII66Q"; 

    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('in');

    window.send = async () => {
        const val = input.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        input.value = "";
        const loadingId = addMsg("Düşünürəm...", 'ai');

        try {
            const result = await model.generateContent(val);
            const response = await result.response;
            document.getElementById(loadingId).textContent = response.text();
        } catch (err) {
            document.getElementById(loadingId).textContent = "Xəta: " + err.message;
            console.error(err);
        }
    };

    function addMsg(txt, cls) {
        const id = 'm' + Date.now();
        const d = document.createElement('div');
        d.id = id;
        d.className = 'msg ' + cls;
        d.textContent = txt;
        chatDiv.appendChild(d);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        return id;
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>

</body>
</html>
