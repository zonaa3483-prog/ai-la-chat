‌Orta təhsilini 2007-ci ildə Ağsu rayon Daşdəmirbəyli kənd tam orta məktəbində almışdır.
Bu illər ərzində bir çox məktəb tədbirləri şeir müsabiqəsi və kiçik səhnəciklərdə də rollar almış,
Məktəb yaşlarından fəallığa görə öz yaşıdlarından seçilmiş,
Və şərəf lövhəsində ilk sıralarda yer almışdır.

Uşaq vaxtlarından şeir yazmağa və aktyorluq sahəsinə də xüsusi maraq göstərmişdir.
Buna görə də o, bir sıra rayon tədbirlərində səhnəciklərdə çıxış etmişdir.
Bu səhnəciklərdən Qanlı Yanvar, Xocalı Faciəsi və s.
Bu kimi tədbirlər də epizodik rolları canlandırmışdır.
Rayon və məktəb tədbirlərində isə şeirlər demişdir.

2018-ci ildə təhsil aldığı Ağsu rayon Daşdəmirbəyli kənd tam orta məktəbini bitirmişdir.
Həmçinin 2018-ci ildə şeir yazmağa başlamış,
Və “Qəlb Yarası” adlı şeirlər kitabının müəllifidir.
Bu kitab müəllifin ilk kitablarından biridir.
Sevgi, xəyanət və yaradan mövzularına aid bir sıra məsələlərə həmin kitabında yer verilmişdir.

Daha sonra 2021-ci ildə Azərbaycan Dövlət Mədəniyyət və İncəsənət Universiteti nəzdində Humanitar Kollecə qəbul olmuş,
Bədii yaradıcılıq işi fakultəsində oxumuş,
Aktyor, Rejissor, Senarist ixtisası üzrə təhsilini almışdır.
Sonra 2023-cü ildə Şuşa dövlət musiqili dram teatrnda oxuduğu sənət üzrə texnoloji təcrübə keçmiş,
Və təcrübə müddətini müvəffəqiyyətlə bitirmiş həmin ildə də təhsilini başa vurmuşdur.

2023-cü ildə “Qəlb Yarası” şeirlər kitabının ilk çapı olmuşdur.
Ardından həmin ildə “Qisas” adlı ikinci kitabını yazmışdır.
Bu kitabda isə qovuşmayan iki aşiqdən bəhs olunur.
Bu kitab sevgi romanı janırındadır.

Daha sonra “Dedektiv Con” adlı üçüncü kitabını qələmə almışdır.
Bu kitabda Con adlı bir dedektivin çətin və ağlasığmaz macəralarından bəhs olunur.
Dedektiv və macəra janırında yazılmışdır.

2024-cü ildə Sənsizlik adlı 4-cü kitabını ərsəyə gətirmişdir.
Kitabda məhəbbət və sevgiyə dair qısa mətnlər yer almışdır.
Həmçinin 2026-cı ildə mahnı sözləri də yazmağa başlamışdır.
Həmin mahnıları Youtube və SoundCloudda dinləyə bilərsiniz.

Daha sonra 2026-cı ildə "Tapşırıq" adlı kitabını qələmə almışdır.
Bu kitabda dövləti üçün canından keçən bir gəncdən bəhs olunur.

        const body = document.body;
        const welcomeUI = document.getElementById('welcome-ui');
        const msgContainer = document.getElementById('messages-container');
        const input = document.getElementById('userInput');
        const themeBtn = document.querySelector('#theme-btn i');

        function toggleTheme() {
            body.classList.toggle('dark');
            themeBtn.className = body.classList.contains('dark') ? "fa-solid fa-sun text-yellow-400" : "fa-solid fa-moon text-gray-600";
        }

        function createNewChat() {
            msgContainer.innerHTML = '';
            msgContainer.classList.add('hidden');
            welcomeUI.classList.remove('hidden');
            input.value = '';
        }

        function handleSend() {
            const rawText = input.value.trim();
            if (!rawText) return;

            const text = rawText.toLowerCase();
            welcomeUI.classList.add('hidden');
            msgContainer.classList.remove('hidden');

            addBubble(rawText, 'user-msg');
            input.value = '';

            setTimeout(() => {
                let response = "Bu barədə məlumatım yoxdur. Başqa sualınız varsa verin?🙂‍↔️";

                // --- DÜZƏLDİLMİŞ MƏNTİQ ---
                // Əvvəlcə tam bərabərliyi yoxlayırıq (2 ilə 26 qarışmasın deyə)
                if (knowledgeBase[text]) {
                    response = knowledgeBase[text];
                } 
                // Əgər tam rəqəm deyilsə, sözləri cümlə içində axtarırıq
                else {
                    for (let key in knowledgeBase) {
                        // Rəqəm olmayan açarları (sözləri) includes ilə axtarırıq
                        if (isNaN(key) && text.includes(key)) {
                            response = knowledgeBase[key];
                            break;
                        }
                    }
                }
                addBubble(response, 'ai-msg');
            }, 600);
        }

        function addBubble(text, type) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${type} animate-fade-in`;
            div.innerText = text;
            msgContainer.appendChild(div);
            
            const chatScreen = document.getElementById('chat-screen');
            chatScreen.scrollTo({ top: chatScreen.scrollHeight, behavior: 'smooth' });
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>
</body>
