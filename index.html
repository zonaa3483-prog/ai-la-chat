<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LA - Süni İntellekt Köpəkçisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; }
        .chat-bubble { max-width: 80%; border-radius: 20px; padding: 12px 16px; margin-bottom: 10px; }
        .user-msg { background-color: #f0f7ff; color: #1a1a1a; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background-color: #f3f4f6; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-shadow { box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="flex items-center justify-between p-4 border-b">
        <div class="flex items-center gap-3">
            <img src="https://i.imgur.com/86v9V89.png" class="w-10 h-10 rounded-full object-cover border" alt="AI-LA">
            <div>
                <h1 class="text-sm font-bold text-gray-800">AI-LA</h1>
                <p class="text-[10px] text-gray-500">Süni intellekt köməkçisi</p>
            </div>
        </div>
        <button class="text-gray-600"><i class="fa-regular fa-moon text-xl"></i></button>
    </header>

    <main id="chat-screen" class="flex-1 overflow-y-auto p-4 flex flex-col items-center">
        
        <div id="welcome-ui" class="mt-20 flex flex-col items-center text-center">
            <div class="relative mb-6">
                <img src="https://i.imgur.com/86v9V89.png" class="w-24 h-24 rounded-full border-4 border-blue-50 shadow-lg" alt="AI-LA">
                <div class="absolute -bottom-2 -right-2 bg-blue-50 p-2 rounded-full shadow-sm">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">AI-LA-ya xoş gəldiniz</h2>
            <p class="text-gray-500 max-w-[280px] leading-relaxed">
                Mən AI-LA-yam, sizin ağıllı köməkçiniz. Hər hansı bir sual verin və ya söhbətə başlayın.
            </p>
        </div>

        <div id="messages-container" class="w-full flex flex-col hidden mt-4"></div>
    </main>

    <footer class="p-4 bg-white input-shadow">
        <div class="max-w-2xl mx-auto relative">
            <input id="userInput" type="text" placeholder="AI-LA-ya mesaj yazın..." 
                class="w-full py-4 px-6 pr-16 bg-gray-50 border border-gray-200 rounded-[30px] focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all text-gray-700">
            
            <button onclick="handleSend()" class="absolute right-2 top-2 bg-blue-400 hover:bg-blue-500 text-white p-3 rounded-full transition-all">
                <svg class="w-5 h-5 rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-3">
            AI-LA səhv edə bilər. Vacib məlumatları yoxlayın.
        </p>
    </footer>

    <script>
        // SƏNİN HAQQINDA MƏLUMATLAR (Bura istədiyini əlavə et)
        const knowledgeBase = {
            "salam": "Salam! Mən AI-LA. Sənə necə kömək edə bilərəm?",
            "kim yaradıb": "Mən sənin şəxsi köməkçinəm və sənin tərəfindən proqramlaşdırılmışam!",
            "adın nədir": "Mənim adım AI-LA-dır.",
            "hara gedək": "Bu gün hava əladır, bəlkə bir az gəzəsən?",
            "kömək et": "Əlbəttə! Nə barədə köməyə ehtiyacın var?"
        };

        const welcomeUI = document.getElementById('welcome-ui');
        const msgContainer = document.getElementById('messages-container');
        const input = document.getElementById('userInput');

        function handleSend() {
            const text = input.value.trim().toLowerCase();
            if (!text) return;

            // İlk mesajda xoş gəldiniz ekranını gizlət
            welcomeUI.classList.add('hidden');
            msgContainer.classList.remove('hidden');

            // İstifadəçi mesajı
            addBubble(input.value, 'user-msg');
            input.value = '';

            // Bot cavabı (Gecikmə ilə)
            setTimeout(() => {
                let response = "Bağışlayın, bu mövzuda hələ təlimatlandırılmamışam. Amma sizinlə söhbət etmək xoşdur!";
                
                for (let key in knowledgeBase) {
                    if (text.includes(key)) {
                        response = knowledgeBase[key];
                        break;
                    }
                }
                addBubble(response, 'ai-msg');
            }, 600);
        }

        function addBubble(text, type) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${type}`;
            div.innerText = text;
            msgContainer.appendChild(div);
            document.getElementById('chat-screen').scrollTop = document.getElementById('chat-screen').scrollHeight;
        }

        // Enter düyməsi ilə göndərmək
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleSend();
        });
    </script>
</body>
</html>
