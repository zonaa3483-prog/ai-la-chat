<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-LA - Süni İntellekt (2026)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FFFFFF; display: flex; flex-direction: column; height: 100vh; color: #1A1D21; transition: 0.3s; overflow: hidden; }
        
        body.dark-mode { background: #0F0F0F; color: #F5F5F5; }
        body.dark-mode header, body.dark-mode footer { background: #181818; border-color: #2A2A2A; }
        body.dark-mode .ai { background: #232323; color: #E0E0E0; border: 1px solid #333; }
        body.dark-mode input { background: #232323; border-color: #333; color: white; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #E8EAEB; background: white; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1.5px solid #007bff; }
        .header-actions { display: flex; align-items: center; gap: 20px; } 
        .action-btn { cursor: pointer; font-size: 20px; color: #70777F; transition: 0.2s; user-select: none; }

        #welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; gap: 15px; }
        .welcome-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #007bff; padding: 4px; box-shadow: 0 10px 20px rgba(0,123,255,0.2); }
        .welcome-icon { width: 44px; height: 44px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #007bff; font-size: 22px; }
        
        main { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0,123,255,0.15); }
        .ai { background: #F1F3F4; color: #1A1D21; align-self: flex-start; border-bottom-left-radius: 4px; white-space: pre-wrap; }

        footer { padding: 20px; background: white; border-top: 1px solid #E8EAEB; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .input-box { width: 100%; max-width: 700px; display: flex; gap: 10px; align-items: center; position: relative; }
        input { flex: 1; padding: 14px 55px 14px 22px; border: 1.5px solid #E8EAEB; border-radius: 30px; outline: none; font-size: 16px; background: #f8f9fa; transition: 0.2s; }
        input:focus { border-color: #007bff; background: #fff; box-shadow: 0 0 0 4px rgba(0,123,255,0.05); }
        button#sendBtn { position: absolute; right: 6px; background: #34A853; color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(52,168,83,0.3); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="https://ia902800.us.archive.org/11/items/0da-12f-11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930/0da12f11-d0a6-4f33-ad83-d4d91b40f930.jpg" class="logo">
        <div><strong>AI-LA 2.0</strong><br><small style="color:#70777F">Süni İntellekt</small></div>
    </div>
    <div class="header-actions">
        <div class="action-btn" title="Yeni Söhbət" onclick="location.reload()">+</div>
        <div class="action-btn" title="Rejimi Dəyiş" onclick="document.body.classList.toggle('dark-mode')">🌓</div>
    </div>
</header>

<div id="welcome-screen">
    <img src="https://ia902800.us.archive.org/11/items/0da-12f-11-d-0a-6-4f-33-ad-83-d-4d-91b-40f-930/0da12f11-d0a6-4f33-ad83-d4d91b40f930.jpg" class="welcome-avatar">
    <div class="welcome-icon">🚀</div>
    <h1>AI-LA 2.0-a xoş gəldiniz</h1>
    <p>Mən 2026-cı ilin ən sürətli Gemini texnologiyası ilə təchiz olunmuşam. Sizi eşidirəm!</p>
</div>

<main id="chat"></main>

<footer>
    <div class="input-box">
        <input type="text" id="in" placeholder="AI-LA-ya mesaj yazın...">
        <button id="sendBtn" onclick="send()">➔</button>
    </div>
    <p style="font-size: 11px; color: #A0A4A8;">AI-LA 2026 • Bütün suallara cavab verməyə hazırdır.</p>
</footer>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // YENİ API AÇARINI BURADA DƏYİŞDİR!
    const API_KEY = "AIzaSyBwXmLRoBx_Zlg51NnN-7m-mfA9NGce6iQ"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    
    // MODEL 2026-cı il versiyasına keçirildi: gemini-2.0-flash-exp
    const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash-exp" });

    const chatDiv = document.getElementById('chat');
    const welcomeScreen = document.getElementById('welcome-screen');
    const input = document.getElementById('in');

    window.send = async () => {
        const val = input.value.trim();
        if(!val) return;

        welcomeScreen.style.display = 'none';
        chatDiv.style.display = 'flex';

        addMsg(val, 'user');
        input.value = "";
        const loadingId = addMsg("Düşünürəm...", 'ai');

        try {
            const result = await model.generateContent(val);
            const response = await result.response;
            document.getElementById(loadingId).innerText = response.text();
        } catch (err) {
            console.error(err);
            document.getElementById(loadingId).innerText = "Bağlantı xətası! VPN-in aktiv olduğundan və ya API açarının yeniliyindən əmin olun.";
        }
    };

    function addMsg(txt, cls) {
        const id = 'm' + Date.now();
        const d = document.createElement('div');
        d.id = id; d.className = 'msg ' + cls; d.textContent = txt;
        chatDiv.appendChild(d);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        return id;
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>
</body>
</html>
