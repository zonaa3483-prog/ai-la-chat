<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ańį-LA - Virtual ńįntellekt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --header-bg: #ffffff; --input-bg: #f9fafb; --ai-bubble: #f3f4f6; }
        .dark { --bg: #0f172a; --text: #f1f5f9; --header-bg: #1e293b; --input-bg: #334155; --ai-bubble: #1e293b; }

        body { background-color: var(--bg); color: var(--text); transition: all 0.3s ease; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .chat-bubble { max-width: 85%; border-radius: 20px; padding: 14px 18px; margin-bottom: 10px; font-size: 15px; position: relative; line-height: 1.6; }
        .user-msg { background-color: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .ai-msg { background-color: var(--ai-bubble); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(0,0,0,0.05); }
        
        .voice-btn { cursor: pointer; margin-top: 10px; font-size: 11px; color: #3b82f6; display: flex; align-items: center; gap: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .voice-btn:hover { color: #2563eb; }

        .typing-dots span { width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-900 z-50">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img id="header-logo" src="" class="w-10 h-10 rounded-full border-2 border-blue-500 p-0.5" alt="AI-LA">
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight">Ańį-LA <span class="text-blue-500 text-[9px] border border-blue-500 px-1 rounded">V2 PRO</span></h1>
                <p class="text-[10px] opacity-60">S√ľni ńįntellekt m√ľh…ôrriki aktivdir</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="createNewChat()" class="text-gray-400 hover:text-blue-500 transition"><i class="fa-solid fa-arrows-rotate"></i></button>
            <button onclick="toggleTheme()" id="theme-btn" class="text-gray-400"><i class="fa-solid fa-moon"></i></button>
        </div>
    </header>

    <main id="chat-screen" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-4 bg-gray-50 dark:bg-slate-950">
        <div id="welcome-ui" class="mt-20 flex flex-col items-center text-center">
            <img id="main-logo" src="" class="w-24 h-24 rounded-full border-4 border-white dark:border-slate-800 mb-4 shadow-2xl animate-pulse" alt="AI-LA">
            <h2 class="text-2xl font-black text-slate-800 dark:text-white">Ańį-LA ńįntellekti</h2>
            <p class="text-sm opacity-50 mt-2 max-w-[250px]">M…ôn Google v…ô dig…ôr qlobal m…ônb…ôl…ôrd…ôn √∂yr…ôn…ôr…ôk suallarńĪnńĪzńĪ cavablandńĪrńĪram.</p>
        </div>
        <div id="messages-container" class="w-full flex flex-col space-y-4"></div>
    </main>

    <footer class="p-4 bg-white dark:bg-slate-900 border-t dark:border-slate-800">
        <div class="max-w-4xl mx-auto relative">
            <input id="userInput" type="text" autocomplete="off" placeholder="H…ôr hansńĪ bir m√∂vzuda sual verin..." 
                class="w-full py-4 px-6 pr-14 rounded-2xl border-none bg-gray-100 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all dark:text-white">
            <button onclick="handleSend()" class="absolute right-2 top-2 bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </footer>

    <script>
        const BOT_IMAGE_URL = "https://ia600708.us.archive.org/32/items/in-shot-20260418-170546888-edit-276364459678532_202604/InShot_20260418_170546888_edit_276364459678532.jpg";
        document.getElementById('header-logo').src = BOT_IMAGE_URL;
        document.getElementById('main-logo').src = BOT_IMAGE_URL;

        const knowledgeBase = {
            "salam": "Salam! M…ôn Ańį-LA. ńįnternet √ľz…ôrind…ôn …ôn son m…ôlumatlarńĪ analiz ed…ôr…ôk s…ôn…ô k√∂m…ôk etm…ôy…ô hazńĪram. N…ôyi √∂yr…ônm…ôk ist…ôyirs…ôn?",
            "1": "M…ôn s…ôni sevirdim, b…ôlk…ô d…ô h…ôl…ô,\nSevgim √ľr…ôyimd…ô s√∂nm…ôyib tamam.\nLakin qoy bu sevgi s…ôni incitm…ôsin,\nS…ôni he√ß bir Ňüeyl…ô m…ôn √ľzm…ôk ist…ôm…ôm.",
            "2": "S…ôn el…ô bir zirv…ôs…ôn ki, h…ôr yet…ôn √ßata bilm…ôz,\nS…ôn el…ô bir baharsan ki, h…ôr yet…ôn baxa bilm…ôz."
        };

        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        function createNewChat() {
            location.reload();
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            document.getElementById('welcome-ui').classList.add('hidden');
            addBubble(text, 'user-msg');
            input.value = '';

            const loadingId = "loading-" + Date.now();
            addBubble(`<div class="typing-dots"><span></span><span></span><span></span></div>`, 'ai-msg', loadingId);

            // "Gemini" t…ôrzi axtarńĪŇü v…ô d√ľŇü√ľnm…ô vaxtńĪ
            setTimeout(() => {
                document.getElementById(loadingId).remove();
                processAIResponse(text);
            }, 1500);
        }

        function processAIResponse(query) {
            let lowerQuery = query.toLowerCase();
            let response = "";

            // 1. Ňěeir v…ô ya daxili baza yoxlanńĪŇüńĪ
            if (knowledgeBase[lowerQuery]) {
                response = knowledgeBase[lowerQuery];
            } 
            // 2. Gemini/Google t…ôrzi intellektual cavab simulyasiyasńĪ
            else {
                response = `AxtarńĪŇü m√ľh…ôrrikl…ôrim vasit…ôsil…ô "${query}" haqqńĪnda m…ôlumatlarńĪ topladńĪm:\n\n` + 
                           `Bu m√∂vzu il…ô bańülńĪ geniŇü araŇüdńĪrma g√∂st…ôrir ki, daxil etdiyiniz sorńüu m√ľr…ôkk…ôb xarakter daŇüńĪyńĪr. ` +
                           `M…ônb…ôl…ôr…ô …ôsas…ôn dey…ô bil…ôr…ôm ki, bu, hazńĪrda sistemim t…ôr…ôfind…ôn …ôn √ßox axtarńĪlan m√∂vzulardan biridir. ` +
                           `M…ôn h…ôr g√ľn minl…ôrl…ô saytdan yeni datalar q…ôbul ed…ôr…ôk √∂z√ľm√ľ t…ôkmill…ôŇüdirir…ôm. ` +
                           `∆Źg…ôr konkret bir fakt v…ô ya detal ist…ôyirsinizs…ô, l√ľtf…ôn sualńĪ daha da d…ôqiql…ôŇüdirin. Sizin √ľ√ß√ľn h…ôr zaman buradayam.`;
            }
            addBubble(response, 'ai-msg', null, true);
        }

        function addBubble(content, type, id = null, hasVoice = false) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.className = `chat-bubble ${type} animate-fade-in`;
            if (id) div.id = id;
            
            const textContent = document.createElement('div');
            textContent.innerHTML = content.replace(/\n/g, '<br>');
            div.appendChild(textContent);

            if (hasVoice) {
                const voiceBtn = document.createElement('div');
                voiceBtn.className = "voice-btn";
                voiceBtn.innerHTML = `<i class="fa-solid fa-volume-high"></i> Dinl…ô`;
                voiceBtn.onclick = () => speakText(content);
                div.appendChild(voiceBtn);
            }

            container.appendChild(div);
            const chatScreen = document.getElementById('chat-screen');
            chatScreen.scrollTo({ top: chatScreen.scrollHeight, behavior: 'smooth' });
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const azVoice = voices.find(v => v.lang.includes('tr') || v.lang.includes('az'));
            if (azVoice) utterance.voice = azVoice;
            utterance.lang = 'tr-TR';
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('userInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleSend();
        });
    </script>
</body>
</html>
